        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {
            background: #0a0e17;

            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            padding: 12px;
        }

        /* carrossel principal */
        .carousel {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 1280 / 720;  /* mantém proporção exata 16:9 */
            background: #000;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            touch-action: pan-y pinch-zoom;  /* permite scroll vertical, mas horizontal capturamos com JS */
        }

        .slides-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;   /* exibe imagem inteira sem cortes (em mobile é mais seguro) */
            /* Se preferir preencher totalmente sem bordas, troque para 'cover' */
            background-color: #0a0e17;
            display: block;
            pointer-events: none;
        }

        /* Botões – grandes e com área de toque ampliada */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            width: 56px;

            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 20;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            font-family: monospace;
            touch-action: manipulation;
        }

        .nav-btn:active {
            background: rgba(80, 110, 160, 0.9);
            transform: translateY(-50%) scale(0.96);
        }

        .nav-prev {
            left: 16px;
        }

        .nav-next {
            right: 16px;
        }

        /* contador centralizado, legível */
        .counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #f0f0f0;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 20;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            white-space: nowrap;
        }

        /* responsivo para telas pequenas: botões um pouco menores mas ainda confortáveis */
        @media (max-width: 700px) {
            .nav-btn {
                width: 48px;
                height: 48px;
                font-size: 1.8rem;
            }
            .counter {
                font-size: 0.75rem;
                padding: 5px 14px;
                bottom: 12px;
            }
            .nav-prev {
                left: 10px;
            }
            .nav-next {

            }
        }

        /* para telas muito pequenas (altura reduzida) mantém usabilidade */
        @media (max-width: 480px) {

                width: 44px;
                height: 44px;
                font-size: 1.6rem;

<script>
    (function() {
        const slides = document.querySelectorAll('.slide');
        const total = slides.length;
        let current = 0;
        const prevBtn = document.getElementById('prevSlide');
        const nextBtn = document.getElementById('nextSlide');
        const counter = document.getElementById('slideCounter');

        function updateSlides() {
            slides.forEach((slide, idx) => {
                if (idx === current) slide.classList.add('active');
                else slide.classList.remove('active');
            });
            counter.innerText = `${current + 1} / ${total}`;
        }

        function goNext() {
            if (current < total - 1) current++;
            else return;  // não faz loop (pode ativar loop descomentando linha abaixo)
            // se quiser loop infinito: current = (current + 1) % total;
            updateSlides();
        }

        function goPrev() {
            if (current > 0) current--;
            else return;
            updateSlides();
        }

        // Eventos de clique
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);

        // Teclado (setas)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                goPrev();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                goNext();
                e.preventDefault();
            }
        });

        // ========== SWIPE para mobile ==========
        let touchStartX = 0;
        let touchEndX = 0;
        const carouselElement = document.getElementById('carousel');

        carouselElement.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        carouselElement.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const deltaX = touchEndX - touchStartX;
            // Limiar de 50px para considerar como swipe
            if (Math.abs(deltaX) > 50) {
                if (deltaX > 0) {
                    // swipe da esquerda para direita -> voltar
                    goPrev();
                } else {
                    // swipe da direita para esquerda -> próximo
                    goNext();
                }
            }
        });

        updateSlides();
    })();
</script>
